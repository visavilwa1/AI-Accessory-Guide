<body>
   
    <body>
        <div class="container">
            <header>
              <h1> Ai Quote Generator</h1>
            </header>

            <main>
                <div class="form-container">
                    <form id="quote-generator-form">
                        <input 
                         type="text"
                         placeholder="Enter a topic"
                         autofocus
                         required
                         autocomplete="off"
                         class="instructions"
                         id="user-instructions"
                          />
                         <input type="submit" value="submit" class="submit-button" /> 
                    </form>
                        <div class="hint">i.e Love, life Friendshop, Self-love</div>

                        <div class="quote" id="quote"></div>
                     </main>
                     <footer>
                         This AI project was coded & designed by <a href="https://github.com/visavilwa1" target="-blank">Visavilwa Daisys</a>
                     </footer>
         </div>
         <script src="main.js"></script>
