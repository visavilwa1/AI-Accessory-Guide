
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai Quote Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&family=Nanum+Myeongjo&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Grandiflora+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Add a link for the Typewriter library -->
    <script src="https://cdn.jsdelivr.net/npm/typewriter-effect@2.18.0/dist/core.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1> Ai Accessory Guide</h1>
        </header>

        <main>
            <div class="form-container">
                <form id="quote-generator-form">
                    <input 
                        type="text"
                        placeholder="Ask for tips"
                        autofocus
                        required
                        autocomplete="off"
                        class="instructions"
                        id="user-instructions"
                    />
                    <input type="submit" value="Submit" class="submit-button" /> 
                </form>
                <div class="hint">i.e., Necklace Layering, Bracelet Stacking,Choosing the Right Earrings </div>
                </div>


                <div class="quote" id="quote"></div>
                 </main>
             <footer>
                 This AI project was coded & designed by
            <a href="https://github.com/visavilwa1" target="_blank">Visavilwa Daisy</a>
            and is
            <a
              href="https://github.com/visavilwa1/AI-Quote-Generator"
              target="_blank"
              >open sourced on GitHub</a>
          </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
